<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Портфолио</title>
    <!-- Подключаем Tailwind CSS для красоты -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Анимации */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fadeIn 0.8s ease-out forwards;
        opacity: 0;
      }
      .delay-100 { animation-delay: 0.1s; }
      .delay-200 { animation-delay: 0.2s; }
      .delay-300 { animation-delay: 0.3s; }
      .delay-400 { animation-delay: 0.4s; }
      
      /* Стили для тегов стека */
      .tech-tag {
        background: rgba(59, 130, 246, 0.1);
        color: #3b82f6;
        padding: 4px 12px;
        border-radius: 9999px;
        font-size: 0.875rem;
        font-weight: 500;
      }
    </style>
  </head>
  
  <body class="bg-gray-50 text-gray-800 font-sans antialiased">
    
    <!-- HERO SECTION -->
    <section class="min-h-screen flex flex-col justify-center items-center px-6 py-20">
      <h1 id="hero-name" class="text-4xl md:text-6xl font-bold text-center animate-fade-in">
        Загрузка...
      </h1>
      <p id="hero-title" class="mt-4 text-lg md:text-xl text-gray-600 animate-fade-in delay-100">
        ...
      </p>
      
      <!-- Контакты -->
      <div id="social-links" class="mt-8 flex gap-6 animate-fade-in delay-200">
        <!-- Иконки вставятся через JS -->
      </div>
    </section>

    <!-- PROJECT SECTION -->
    <section class="py-20 px-6 bg-white">
      <div class="max-w-3xl mx-auto">
        <div class="animate-fade-in delay-300">
          <span id="project-event" class="text-sm font-medium text-blue-600 uppercase tracking-wider">
            ...
          </span>
          <h2 id="project-name" class="mt-2 text-3xl md:text-4xl font-bold text-gray-900">
            ...
          </h2>
          <p id="project-desc" class="mt-4 text-lg text-gray-600 leading-relaxed">
            ...
          </p>
        </div>

        <!-- Задачи -->
        <div class="mt-10 animate-fade-in delay-400">
          <h3 class="text-xl font-semibold text-gray-900 mb-4">Мои задачи:</h3>
          <ul id="project-tasks" class="space-y-3">
            <!-- Задачи вставятся через JS -->
          </ul>
        </div>

        <!-- Стек технологий -->
        <div class="mt-10 animate-fade-in delay-400">
          <h3 class="text-xl font-semibold text-gray-900 mb-4">Стек технологий:</h3>
          <div id="project-stack" class="flex flex-wrap gap-2">
            <!-- Стек вставится через JS -->
          </div>
        </div>
      </div>
    </section>

    <!-- DIPLOMA SECTION -->
    <section class="py-20 px-6 bg-gray-50">
      <div class="max-w-2xl mx-auto text-center animate-fade-in delay-400">
        <h2 class="text-2xl font-bold text-gray-900 mb-8">Награда</h2>
        <div class="rounded-xl overflow-hidden shadow-lg bg-white p-4">
          <img id="diploma-img" src="" alt="Диплом" class="w-full h-auto rounded-lg" />
        </div>
      </div>
    </section>

    <!-- FOOTER -->
    <footer class="py-8 px-6 text-center text-gray-500 text-sm">
      <p id="footer-text">...</p>
    </footer>

    <!-- === КОНФИГУРАЦИЯ САЙТА (МЕНЯТЬ ДАННЫЕ ТУТ) === -->
    <script>
      const config = {
        name: "Иванов Иван Иванович",
        title: "Разработчик | Участник хакатонов",
        
        social: {
          github: "https://github.com/твой-ник",
          telegram: "https://t.me/твой_ник",
          email: "mailto:твоя@почта.com",
        },

        project: {
          eventName: "Хакатон 2025",
          productName: "Название Продукта",
          description: "Краткое описание продукта — что он делает и какую проблему решает.",
          tasks: [
            "Разработка архитектуры приложения",
            "Реализация API endpoints",
            "Интеграция с внешними сервисами",
            "Оптимизация производительности",
          ],
          stack: ["Go", "PostgreSQL", "Docker", "gRPC", "Redis"],
        },

        diploma: {
          image: "public/diploma.jpg", 
          alt: "Диплом за хакатон",
        },
      };

      // === ДВИЖОК САЙТА (НЕ МЕНЯТЬ) ===
      document.title = `${config.name} — Портфолио`;
      document.getElementById('hero-name').textContent = config.name;
      document.getElementById('hero-title').textContent = config.title;
      document.getElementById('project-event').textContent = config.project.eventName;
      document.getElementById('project-name').textContent = config.project.productName;
      document.getElementById('project-desc').textContent = config.project.description;
      document.getElementById('diploma-img').src = config.diploma.image;
      document.getElementById('diploma-img').alt = config.diploma.alt;
      document.getElementById('footer-text').textContent = `© ${new Date().getFullYear()} ${config.name}. Все права защищены.`;

      // Соцсети
      const socialContainer = document.getElementById('social-links');
      const icons = {
        github: '<path d="M9 19c-4.3 1.4 -4.3 -2.5 -6 -3m12 5v-3.5c0 -1 .1 -1.4 -.5 -2c2.8 -.3 5.5 -1.4 5.5 -6a4.6 4.6 0 0 0 -1.3 -3.2a4.2 4.2 0 0 0 -.1 -3.2s-1.1 -.3 -3.5 1.3a12.3 12.3 0 0 0 -6.2 0c-2.4 -1.6 -3.5 -1.3 -3.5 -1.3a4.2 4.2 0 0 0 -.1 3.2a4.6 4.6 0 0 0 -1.3 3.2c0 4.6 2.7 5.7 5.5 6c-.6 .6 -.6 1.2 -.5 2v3.5"/>',
        telegram: '<path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M15 10l-4 4l6 6l4 -16l-18 7l4 2l2 6l3 -4"/>',
        email: '<path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M3 7a2 2 0 0 1 2 -2h14a2 2 0 0 1 2 2v10a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2v-10z"/><path d="M3 7l9 6l9 -6"/>'
      };
      
      Object.entries(config.social).forEach(([key, link]) => {
        if(link) {
          socialContainer.innerHTML += `
            <a href="${link}" target="_blank" rel="noopener noreferrer" class="text-gray-600 hover:text-blue-600 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                ${icons[key] || ''}
              </svg>
            </a>`;
        }
      });

      // Задачи
      const tasksContainer = document.getElementById('project-tasks');
      config.project.tasks.forEach(task => {
        tasksContainer.innerHTML += `
          <li class="flex items-start gap-3 text-gray-700">
            <svg class="w-5 h-5 text-blue-600 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
            <span>${task}</span>
          </li>`;
      });

      // Стек
      const stackContainer = document.getElementById('project-stack');
      config.project.stack.forEach(tech => {
        stackContainer.innerHTML += `<span class="tech-tag">${tech}</span>`;
      });
    </script>
  </body>
</html>
